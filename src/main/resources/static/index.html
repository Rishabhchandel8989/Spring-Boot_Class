<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>

    <style>

        body{
            font-family: Arial;
            background:#f4f4f4;
            padding:30px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0px 0px 10px gray;
        }

        input{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            padding:10px 20px;
            margin:5px;
            cursor:pointer;
        }

        pre{
            background:#eee;
            padding:10px;
        }

    </style>

</head>

<body>

<div class="container">

    <h2>Student Management System</h2>

    <hr>

    <h3>Create Student</h3>

    <input type="number" id="id" placeholder="Student Id">

    <input type="text" id="name" placeholder="Student Name">

    <input type="text" id="department" placeholder="Department">

    <input type="number" id="regNo" placeholder="Registration Number">

    <button onclick="createStudent()">Create</button>

    <hr>

    <h3>Get Student By Id</h3>

    <input type="number" id="searchId" placeholder="Enter Id">

    <button onclick="getStudent()">Search</button>

    <hr>

    <h3>Update Student</h3>

    <input type="number" id="uid" placeholder="Student Id">

    <input type="text" id="uname" placeholder="Student Name">

    <input type="text" id="udepartment" placeholder="Department">

    <input type="number" id="uregNo" placeholder="Registration Number">

    <button onclick="updateStudent()">Update</button>

    <hr>

    <h3>Delete Student</h3>

    <input type="number" id="deleteId" placeholder="Student Id">

    <button onclick="deleteStudent()">Delete</button>

    <hr>

    <h3>Response</h3>

    <pre id="result"></pre>

</div>

<script>

    const URL="http://localhost:8080";

    function show(data){

    document.getElementById("result").innerText=
    JSON.stringify(data,null,2);

    }

    // CREATE

    function createStudent(){

    fetch(URL+"/create",{

    method:"POST",

    headers:{
    "Content-Type":"application/json"
    },

    body:JSON.stringify({

    id:Number(document.getElementById("id").value),

    name:document.getElementById("name").value,

    deparment:document.getElementById("department").value,

    regNo:Number(document.getElementById("regNo").value)

    })

    })

    .then(res=>res.json())

    .then(data=>show(data))

    .catch(err=>show(err));

    }


    // GET

    function getStudent(){

    let id=document.getElementById("searchId").value;

    fetch(URL+"/students/"+id)

    .then(res=>res.json())

    .then(data=>show(data))

    .catch(err=>show(err));

    }


    // UPDATE

    function updateStudent(){

    let id=document.getElementById("uid").value;

    fetch(URL+"/students/"+id,{

    method:"PUT",

    headers:{

    "Content-Type":"application/json"

    },

    body:JSON.stringify({

    id:Number(id),

    name:document.getElementById("uname").value,

    deparment:document.getElementById("udepartment").value,

    regNo:Number(document.getElementById("uregNo").value)

    })

    })

    .then(res=>res.json())

    .then(data=>show(data))

    .catch(err=>show(err));

    }


    // DELETE

    function deleteStudent(){

    let id=document.getElementById("deleteId").value;

    fetch(URL+"/students/"+id,{

    method:"DELETE"

    })

    .then(res=>res.text())

    .then(data=>show(data))

    .catch(err=>show(err));

    }

</script>

</body>
</html>
